name: New MCP server
version: 0.0.1
schema: v1
mcpServers:
  - name: search-the-web-nondocker-mcp
    command: <path_to_python3>\python3.exe #result of command which.exe python3(windows) or command which python3(mac/linux). Do create venv (virtual env and do pip install in this directory first)
    args:
      - <path_to_project>\mcp_search_server.py
    env:
      TAVILY_API_KEY: <your_tavily_api_key>


